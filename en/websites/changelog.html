            </p>
        </div>

        <div class="gallery" id="changelog-container">

    <script>
        async function loadChangelog() {
            const container =
                document.getElementById("changelog-container");
            const username = "farinalten";
            const repository = "Farinalten-website";
            const apiUrl =
                `https://api.github.com/repos/${username}/${repository}/releases`;

            try {

                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error("GitHub API Error");
                }

                const releases = await response.json();

                container.innerHTML = "";

                if (releases.length === 0) {

                    container.innerHTML = `
                        <div class="Box">
                            <h3 class="title">
                                No chnages as yet
                            </h3>

                            <p class="subtitle">
                               Nothing here.
                            </p>
                        </div>
                    `;

                    return;
                }

                releases.forEach(release => {

                    const box = document.createElement("div");

                    box.className = "Box";

                    const formattedDate =
                        new Date(release.published_at)
                        .toLocaleDateString("de-DE");

                    const releaseTitle =
                        release.name || release.tag_name;

                    const releaseBody =
                        release.body
                        ? release.body.replace(/\n/g, "<br>")
                        : "No description provided.";

                    box.innerHTML = `
                        <h3 class="title">
                            ${formattedDate}
                        </h3>

                        <p class="subtitle">
                            <strong>${releaseTitle}</strong>
                            <br><br>

                            ${releaseBody}
                        </p>
                    `;

                    container.appendChild(box);

                });

            } catch (error) {

                console.error(error);

                container.innerHTML = `
                    <div class="Box">

                        <h3 class="title">
                           Error!
                        </h3>

                        <p class="subtitle">
                           The latest changes could not be loaded!
                        </p>

                    </div>
                `;
            }
        }
        loadChangelog();
    </script>
</body>
