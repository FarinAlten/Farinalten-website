<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="../../css/style.css" rel="stylesheet" />
        <title>Blog - Farin Altenhöner</title>
        <link rel="icon" href="../../fav-icon.png" type="image/x-icon" />
        <link
            rel="shortcut icon"
            href="../../fav-icon.png"
            type="image/x-icon"
        />
    </head>
    <body>
        <nav>
            <div class="nav-container">
                <a class="nav-logo" href="../../home.html">
                    <img src="../../fav-icon.png" alt="Logo" class="logo-img" />
                </a>
                <div class="nav-links">
                    <a class="nav-link" href="../../home.html">Home</a>
                    <a class="nav-link" href="../projects.html">Projects</a>
                    <a class="nav-link" href="../contact.html">Contact</a>
                    <a class="nav-link active" href="../blog.html">Blog</a>
                </div>
            </div>
        </nav>

        <main class="content">
            <header class="headerbox">
                <h1 class="title">Spring 2026</h1>
                <p class="headersubtitle">
                    Photographs and impressions from spring 2026.
                </p>
            </header>

            <section class="image-showcase">
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779040935/IMG_1539_mqqb6m.heic"
                        alt="Spring Impression 1"
                        class="clickable-image"
                    />
                </div>
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779040903/IMG_1540_i9cc6f.heic"
                        alt="Spring Impression 2"
                        class="clickable-image"
                    />
                </div>
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779041137/IMG_1900_bwczbz.heic"
                        alt="Spring Impression 3"
                        class="clickable-image"
                    />
                </div>
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779041031/IMG_1634_iibluk.heic"
                        alt="Spring Impression 4"
                        class="clickable-image"
                    />
                </div>
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779041027/IMG_1636_dp0yaw.heic"
                        alt="Spring Impression 5"
                        class="clickable-image"
                    />
                </div>
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779040925/IMG_2014_iudnpi.heic"
                        alt="Spring Impression 6"
                        class="clickable-image"
                    />
                </div>
                <div class="image-card portrait">
                    <img
                        src="https://res.cloudinary.com/dmn2h1vj7/image/upload/v1779040894/IMG_2010_ns4xhh.heic"
                        alt="Spring Impression 7"
                        class="clickable-image"
                    />
                </div>
            </section>
        </main>

        <div id="image-viewer" class="viewer-overlay">
            <span class="viewer-close">&times;</span>
            <img class="viewer-content" id="viewer-image" />
            <div id="viewer-caption" class="viewer-caption"></div>
        </div>

        <footer>
            <span>© 2026 Farin Altenhöner</span>
            <div class="footer-links">
                <a href="../legal.html">Legal Info</a>
                <a href="../contact.html">Contact</a>
                <a href="../blog.html">Back to Blog</a>
            </div>
        </footer>

        <script>
            const viewer = document.getElementById("image-viewer");
            const viewerImage = document.getElementById("viewer-image");
            const viewerCaption = document.getElementById("viewer-caption");
            const closeButton = document.querySelector(".viewer-close");
            const images = document.querySelectorAll(".clickable-image");

            images.forEach((image) => {
                image.addEventListener("click", () => {
                    viewer.classList.add("active");
                    viewerImage.src = image.src;
                    viewerCaption.textContent = image.alt;
                    document.body.style.overflow = "hidden";
                });
            });

            function closeViewer() {
                viewer.classList.remove("active");
                document.body.style.overflow = "";
            }

            closeButton.addEventListener("click", closeViewer);
            viewer.addEventListener("click", (e) => {
                if (e.target === viewer) {
                    closeViewer();
                }
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    closeViewer();
                }
            });
        </script>
    </body>
</html>
